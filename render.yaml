services:
  - type: web
    name: rp-architect
    env: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm --prefix server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
